name: 02-Terraform Apply (K3s Cluster)

on:
  push:
    branches: ["main", "cicd-test", "hanseo2"]
    paths:
      - "02-k3s-cluster/**"
      - ".github/workflows/02-k3s-apply.yml"
  
  workflow_run:
    workflows: ["01-Terraform Apply (Infra Base)"]
    types:
      - completed
      
  workflow_dispatch:

concurrency:
  group: terraform-k3s
  cancel-in-progress: false

jobs:
  terraform-k3s:    
    runs-on: self-hosted

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ap-northeast-2
      TF_DIR: ./02-k3s-cluster
      ANSIBLE_REPO: KT-Cloud-2nd-Team5/aws-k8s-ansible-4weeks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          set +e
          terraform plan -detailed-exitcode -out=tfplan
          code=$?
          echo "PLAN_EXITCODE=$code" >> $GITHUB_ENV
          
          if [ "$code" -eq 0 ]; then
             echo "결과: 변경 사항 없음."
          elif [ "$code" -eq 2 ]; then
             echo "결과: 인프라 변경 감지됨. Apply를 진행합니다."
          else
             echo "결과: Plan 중 에러 발생."
             exit 1
          fi

      - name: Terraform Apply
        if: env.PLAN_EXITCODE == '2'
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan

      # 클러스터 인스턴스(K3s)가 변경되었을 때 Ansible 실행
      - name: Trigger Ansible Repository
        if: env.PLAN_EXITCODE == '2'
        env:
          DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            https://api.github.com/repos/${{ env.ANSIBLE_REPO }}/dispatches \
            -d '{"event_type":"run-ansible"}'