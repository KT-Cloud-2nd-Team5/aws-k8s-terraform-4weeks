name: 01-Terraform Apply (Bastion Runner)

on:
  push:
    branches: ["main"]
    paths:
      # 루트에 있는 모든 .tf 파일과 설정파일 감시
      - "**.tf"
      - "terraform.tfvars"
      - ".github/workflows/01-terraform-apply.yml"

jobs:
  terraform-apply:
    runs-on: self-hosted

    env:
      # [중요] AWS 인증 정보: GitHub Secrets에서 가져옴
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ap-northeast-2

      # 파일들이 루트에 있으므로 현재 디렉토리(.) 설정
      TF_DIR: . 
      ANSIBLE_REPO: KT-Cloud-2nd-Team5/aws-k8s-ansible-4weeks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      # 이전 인증 기록 삭제하여 충돌 방지
      - name: Clear AWS_PROFILE
        run: unset AWS_PROFILE

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -out=tfplan

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan

      # 테라폼 성공 시 앤서블 레포지토리 실행 트리거
